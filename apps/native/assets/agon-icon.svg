<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#000000"/>

  <!-- Speed lines behind "go" (running motion) -->
  <line x1="200" y1="490" x2="340" y2="490" stroke="#f97316" stroke-width="4" stroke-linecap="round" opacity="0.3"/>
  <line x1="220" y1="520" x2="340" y2="520" stroke="#f97316" stroke-width="3" stroke-linecap="round" opacity="0.2"/>
  <line x1="240" y1="550" x2="340" y2="550" stroke="#f97316" stroke-width="2" stroke-linecap="round" opacity="0.1"/>

  <!-- "a" — white, bold -->
  <text
    x="148"
    y="600"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="380"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-12"
  >a</text>

  <!-- "go" — orange, bold italic -->
  <text
    x="306"
    y="600"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="380"
    font-weight="900"
    font-style="italic"
    fill="#f97316"
    letter-spacing="-12"
  >go</text>

  <!-- "n" — white, bold -->
  <text
    x="748"
    y="600"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="380"
    font-weight="900"
    fill="#ffffff"
    letter-spacing="-12"
  >n</text>

  <!-- Orange underline accent under "go" -->
  <rect x="306" y="622" width="442" height="12" rx="6" fill="#f97316"/>
</svg>
